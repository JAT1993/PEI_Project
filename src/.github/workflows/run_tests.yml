name: Databricks Automated Test Runner

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  execute-pyspark-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feature Branch Code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Run Pytest Suite on Databricks Cluster
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "🚀 Submitting test execution run to Databricks..."
          
          RUN_ID=$(databricks runs submit --json '{
            "run_name": "GitHub Actions - PR Pytest Runner",
            "tasks": [
              {
                "task_key": "pyspark_unit_tests",
                "spark_python_task": {
                  "python_file": "/Workspace/Users/jatin.march1993.arora@gmail.com/PEI_Project/Pyspark_Project/tests/test_analytics.py"
                },
                "existing_cluster_id": "0614-123900-pt2yp3oi-v2n"
              }
            ]
          }' --query "run_id")
          
          echo "✅ Job submitted successfully. Run ID: $RUN_ID"
          echo "📊 Monitoring execution logs live..."
          
          databricks runs wait $RUN_ID